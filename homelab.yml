name: thinkpad-homelab
domain: rhscloud.com
local_domain: home.lab

defaults:
  restart: unless-stopped

networks:
  proxy:
    name: proxy
  backend:
    name: backend

volumes:
  postgres_data: {}
  redis_data: {}
  nextcloud_html: {}
  nextcloud_data: {}

traefik:
  dashboard: true
  dashboard_insecure: true
  entrypoints:
    web: ":80"
  log_level: WARN
  expose_by_default: false
  docker_socket: /var/run/docker.sock

cloudflare_tunnel:
  mode: token

services:
  postgres:
    image: postgres:16-alpine
    networks:
      backend: {}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      backend: {}
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  nextcloud:
    image: nextcloud:33-apache
    networks:
      proxy:
        aliases: [nextcloud.home.lab]
      backend: {}
    depends_on:
      postgres: service_healthy
      redis: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "nextcloud.rhscloud.com nextcloud.home.lab 192.168.1.11"
      TRUSTED_PROXIES: "172.16.0.0/12"
      OVERWRITEPROTOCOL: "https"
      OVERWRITEHOST: "nextcloud.rhscloud.com"
      PHP_MEMORY_LIMIT: 512M
      PHP_UPLOAD_LIMIT: 10G
    volumes:
      - nextcloud_html:/var/www/html
      - nextcloud_data:/var/www/html/data
      - ./hsts.conf:/etc/apache2/conf-enabled/hsts.conf:ro
      - ./post-upgrade.sh:/docker-entrypoint-hooks.d/post-upgrade/post-upgrade.sh:ro
    routing:
      port: 80
      routers:
        local:
          host: nextcloud.home.lab
          entrypoints: [web]
        public:
          host: nextcloud.rhscloud.com
          entrypoints: [web]
          tunnel: true
      middlewares:
        headers:
          stsSeconds: 15552000
          stsIncludeSubdomains: true
        redirectregex:
          permanent: true
          regex: "https?://([^/]*)/.well-known/(?:card|cal)dav"
          replacement: "http://$${1}/remote.php/dav"

  collabora:
    image: collabora/code:latest
    networks:
      proxy:
        aliases: [collabora.home.lab]
    environment:
      aliasgroup1: "https://nextcloud\\.rhscloud\\.com"
      server_name: "collabora.rhscloud.com"
      username: ${COLLABORA_ADMIN_USER}
      password: ${COLLABORA_ADMIN_PASSWORD}
      extra_params: "--o:ssl.enable=false --o:ssl.termination=true --o:num_prespawn_children=1 --o:user_interface.use_integration_theme=true --o:per_document.doc_background_color=16777215"
    cap_add: [MKNOD, SYS_ADMIN]
    routing:
      port: 9980
      routers:
        local:
          host: collabora.home.lab
          entrypoints: [web]
        public:
          host: collabora.rhscloud.com
          entrypoints: [web]
          tunnel: true
